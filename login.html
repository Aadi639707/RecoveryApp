<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecoverPro | Premium Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom CSS for Video-like 3D Animations & Neon Effects -->
    <style>
        /* Dark Theme Background */
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at top right, #0a192f 0%, #050505 50%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* Input Field Neon Focus */
        .neon-input {
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s ease;
        }
        .neon-input:focus {
            border-bottom: 2px solid #00f2fe;
            box-shadow: 0 10px 20px -10px rgba(0, 242, 254, 0.5);
            outline: none;
            background: rgba(0, 242, 254, 0.05);
            transform: translateY(-2px);
        }

        /* 3D Button Tap Animation */
        .neon-btn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #000;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            position: relative;
            overflow: hidden;
        }
        .neon-btn:active {
            transform: scale(0.94);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.8);
        }

        /* Floating Animation for the Logo */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); text-shadow: 0 0 20px rgba(0, 242, 254, 0.8); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        /* Page Load Entrance Animation */
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-entrance {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Secondary Button Tap Effect */
        .glass-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .glass-btn:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.1);
            border-color: #4facfe;
            box-shadow: inset 0 0 10px rgba(79, 172, 254, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <!-- Glowing Background Orbs (For 3D depth) -->
    <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-cyan-600 rounded-full mix-blend-screen filter blur-[100px] opacity-30"></div>
    <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-blue-600 rounded-full mix-blend-screen filter blur-[100px] opacity-30"></div>

    <!-- Main Glass Login Container -->
    <div class="glass-panel w-full max-w-md p-8 md:p-10 relative z-10 animate-entrance">
        
        <!-- Animated Logo -->
        <div class="text-center mb-12">
            <h1 class="text-5xl font-extrabold tracking-widest animate-float">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">A</span><span class="text-white text-3xl font-light tracking-normal">pp</span>
            </h1>
            <p class="text-gray-400 text-sm mt-3 tracking-widest uppercase opacity-80">Welcome Back</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-8">
            
            <!-- Email Input -->
            <div class="relative group">
                <span class="absolute left-0 bottom-4 text-gray-500 transition-all duration-300 group-focus-within:-translate-y-6 group-focus-within:text-cyan-400 group-focus-within:text-xs">Email Address</span>
                <input type="email" id="email" required class="neon-input w-full text-white px-1 py-3 pt-6 text-lg placeholder-transparent" placeholder="Email Address">
            </div>

            <!-- Password Input -->
            <div class="relative group">
                <span class="absolute left-0 bottom-4 text-gray-500 transition-all duration-300 group-focus-within:-translate-y-6 group-focus-within:text-cyan-400 group-focus-within:text-xs">Password</span>
                <input type="password" id="password" required class="neon-input w-full text-white px-1 py-3 pt-6 text-lg placeholder-transparent" placeholder="Password">
                
                <!-- Forgot Password Link -->
                <div class="flex justify-end mt-2">
                    <a href="#" class="text-xs text-cyan-400 hover:text-cyan-300 transition-colors">Forgot Password?</a>
                </div>
            </div>

            <!-- Animated Submit Button -->
            <button type="submit" class="neon-btn w-full font-bold text-lg py-4 rounded-xl mt-4 tracking-widest uppercase">
                Login
            </button>
        </form>

        <div class="my-8 border-t border-white/10 relative">
            <span class="absolute left-1/2 -translate-x-1/2 -top-3 bg-[#0a0a0a] px-4 text-xs text-gray-500 tracking-widest">OR</span>
        </div>

        <!-- Animated Google Login Button -->
        <button id="googleLoginBtn" class="glass-btn w-full flex items-center justify-center gap-3 py-3.5 rounded-xl text-sm font-semibold tracking-wide text-gray-200">
            <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </button>

        <!-- Signup Link -->
        <p class="text-center text-sm text-gray-500 mt-8">
            Don't have an account? <a href="#" class="text-cyan-400 font-semibold hover:text-cyan-300 transition-colors">Sign up</a>
        </p>

    </div>

    <!-- Script to Add Haptic / Ripple feedback on tap -->
    <script>
        // Adding tap sound/vibration effect simulation
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                // Vibrate phone if supported
                if (navigator.vibrate) {
                    navigator.vibrate(50);
                }
            });
        });
    </script>
    <script type="module" src="assets/auth.js"></script>
    
</body>
</html>
