<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecoverPro | Premium Register</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Same Dark Neon Theme */
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at top right, #0a192f 0%, #050505 50%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .neon-input {
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s ease;
        }
        .neon-input:focus {
            border-bottom: 2px solid #00f2fe;
            box-shadow: 0 10px 20px -10px rgba(0, 242, 254, 0.5);
            outline: none;
            background: rgba(0, 242, 254, 0.05);
            transform: translateY(-2px);
        }
        .neon-btn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #000;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
        .neon-btn:active {
            transform: scale(0.94);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.8);
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-entrance {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <!-- Glowing Background Orbs -->
    <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-cyan-600 rounded-full mix-blend-screen filter blur-[100px] opacity-30"></div>
    <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-blue-600 rounded-full mix-blend-screen filter blur-[100px] opacity-30"></div>

    <!-- Glass Register Container -->
    <div class="glass-panel w-full max-w-md p-8 md:p-10 relative z-10 animate-entrance">
        
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">Create Account</h1>
            <p class="text-gray-400 text-sm mt-2 tracking-widest uppercase opacity-80">Join RecoverPro</p>
        </div>

        <form id="registerForm" class="space-y-6">
            
            <div class="relative group">
                <span class="absolute left-0 bottom-4 text-gray-500 transition-all duration-300 group-focus-within:-translate-y-6 group-focus-within:text-cyan-400 group-focus-within:text-xs">Full Name</span>
                <input type="text" id="name" required class="neon-input w-full text-white px-1 py-3 pt-6 text-lg placeholder-transparent" placeholder="Full Name">
            </div>

            <div class="relative group">
                <span class="absolute left-0 bottom-4 text-gray-500 transition-all duration-300 group-focus-within:-translate-y-6 group-focus-within:text-cyan-400 group-focus-within:text-xs">Email Address</span>
                <input type="email" id="email" required class="neon-input w-full text-white px-1 py-3 pt-6 text-lg placeholder-transparent" placeholder="Email Address">
            </div>

            <div class="relative group">
                <span class="absolute left-0 bottom-4 text-gray-500 transition-all duration-300 group-focus-within:-translate-y-6 group-focus-within:text-cyan-400 group-focus-within:text-xs">Password</span>
                <input type="password" id="password" required class="neon-input w-full text-white px-1 py-3 pt-6 text-lg placeholder-transparent" placeholder="Password">
            </div>

            <button type="submit" class="neon-btn w-full font-bold text-lg py-4 rounded-xl mt-4 tracking-widest uppercase">
                Sign Up
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-8">
            Already have an account? <a href="login.html" class="text-cyan-400 font-semibold hover:text-cyan-300 transition-colors">Login</a>
        </p>

    </div>

    <!-- Firebase Logic Link -->
    <script type="module" src="assets/auth.js"></script>

</body>
</html>
