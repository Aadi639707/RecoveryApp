<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | RecoverPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <!-- Logo / Brand -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-blue-600 tracking-tight">
                Recover<span class="text-gray-800">Pro</span>
            </h2>
            <p class="text-gray-500 mt-2">Create your new account</p>
        </div>

        <!-- Registration Form -->
        <form id="registerForm" class="space-y-5">
            <div>
                <label class="block text-gray-700 font-semibold mb-1">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" required>
            </div>

            <div>
                <label class="block text-gray-700 font-semibold mb-1">Email Address</label>
                <input type="email" id="email" placeholder="example@gmail.com" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" required>
            </div>

            <div>
                <label class="block text-gray-700 font-semibold mb-1">Password</label>
                <input type="password" id="password" placeholder="Create a strong password" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" required>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-300 shadow-md">
                Sign Up
            </button>
        </form>

        <!-- Google Login Divider -->
        <div class="mt-6 flex items-center justify-between">
            <span class="border-b w-1/5 lg:w-1/4"></span>
            <span class="text-xs text-center text-gray-500 uppercase">Or join with</span>
            <span class="border-b w-1/5 lg:w-1/4"></span>
        </div>

        <!-- Google Login Button -->
        <button class="w-full mt-6 bg-white border border-gray-300 text-gray-700 font-semibold py-3 rounded-lg hover:bg-gray-50 flex items-center justify-center gap-2 transition shadow-sm">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5">
            Sign up with Google
        </button>

        <p class="text-center text-gray-600 mt-6">
            Already have an account? <a href="login.html" class="text-blue-600 font-semibold hover:underline">Login here</a>
        </p>
    </div>

    <script src="assets/auth.js"></script>
</body>
</html>
